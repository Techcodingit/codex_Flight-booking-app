services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: staff_travel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: ./backend/.env.example
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    env_file: ./frontend/.env.example
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
